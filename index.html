<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realfagsnettverk - PRIS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

    <header class="bg-blue-900 text-white shadow-md">
        <div class="container mx-auto px-4 py-6 flex flex-col md:flex-row justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wide text-amber-400">Realfagsnettverket</h1>
            <nav class="flex space-x-2 mt-4 md:mt-0 bg-blue-950 p-1 rounded-lg">
                <button onclick="byttFane('blogg')" id="btn-blogg" class="fane-btn px-4 py-2 rounded-md font-medium transition bg-blue-700 text-white">Aktuelt</button>
                <button onclick="byttFane('kalender')" id="btn-kalender" class="fane-btn px-4 py-2 rounded-md font-medium transition text-gray-300 hover:text-white">Kalender</button>
                <button onclick="byttFane('filer')" id="btn-filer" class="fane-btn px-4 py-2 rounded-md font-medium transition text-gray-300 hover:text-white">Filarkiv</button>
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 flex-grow">
        
        <section id="fane-blogg" class="fane-seksjon">
            <h2 class="text-3xl font-bold mb-6 text-blue-900 border-b pb-2">Aktuelle saker</h2>
            <div id="blogg-container" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
                <p class="text-gray-500 italic">Laster artikler...</p>
            </div>
        </section>

        <section id="fane-kalender" class="fane-seksjon hidden">
            <h2 class="text-3xl font-bold mb-6 text-blue-900 border-b pb-2">Webinarer og hendelser</h2>
            <div id="kalender-container" class="space-y-4 max-w-4xl">
                <p class="text-gray-500 italic">Laster kalender...</p>
            </div>
        </section>

        <section id="fane-filer" class="fane-seksjon hidden">
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 border-b pb-4">
                <h2 class="text-3xl font-bold text-blue-900">Faglig Ressursarkiv</h2>
                <div class="mt-4 md:mt-0">
                    <input type="text" id="fil-sok" oninput="filtrerFiler()" placeholder="Søk i filer eller emner..." class="w-full md:w-64 px-4 py-2 border rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
            <div id="filer-container" class="bg-white rounded-xl shadow overflow-hidden">
                <p class="p-6 text-gray-500 italic">Laster filer...</p>
            </div>
        </section>

    </main>

    <footer class="bg-gray-800 text-gray-400 py-6 mt-12 border-t border-gray-700 text-sm">
        <div class="container mx-auto px-4 flex flex-col md:flex-row justify-between items-center">
            <p>&copy; 2026 Realfagsnettverket i høyskolemiljøet.</p>
            <p id="sist-oppdatert" class="text-xs text-gray-500 mt-2 md:mt-0">Laster status...</p>
        </div>
    </footer>

    <script>
        // Global variabel for å holde på dataene som hentes
        let nettverkData = { blogg: [], kalender: [], filer: [] };

        // 1. HENT DATA FRA data.json
        async function lastData() {
            try {
                // Henter data.json fra samme mappe på GitHub Pages
                const respons = await fetch('data.json');
                if (!respons.ok) throw new Error('Fant ikke data.json');
                
                nettverkData = await respons.json();
                
                // Tegn opp innholdet i de ulike seksjonene
                tegnBlogg();
                tegnKalender();
                tegnFiler();
                
                document.getElementById('sist-oppdatert').innerText = `Sist oppdatert fra Pi: ${nettverkData.sist_oppdatert || 'Ukjent'}`;
            } catch (feil) {
                console.error('Feil under lasting av data:', feil);
                visFeilmeldinger();
            }
        }

        // 2. FANE-NAVIGASJON
        function byttFane(faneNavn) {
            // Skjul alle seksjoner
            document.querySelectorAll('.fane-seksjon').forEach(el => el.classList.add('hidden'));
            // Vis valgt seksjon
            document.getElementById(`fane-${faneNavn}`).classList.remove('hidden');
            
            // Oppdater knappestilinger
            document.querySelectorAll('.fane-btn').forEach(btn => {
                btn.classList.remove('bg-blue-700', 'text-white');
                btn.classList.add('text-gray-300', 'hover:text-white');
            });
            const aktivKnapp = document.getElementById(`btn-${faneNavn}`);
            aktivKnapp.classList.remove('text-gray-300', 'hover:text-white');
            aktivKnapp.classList.add('bg-blue-700', 'text-white');
        }

        // 3. RENDRE BLOGGPOSTER
        function tegnBlogg() {
            const container = document.getElementById('blogg-container');
            if (nettverkData.blogg.length === 0) {
                container.innerHTML = '<p class="text-gray-500 italic col-span-full">Ingen aktuelle saker publisert ennå.</p>';
                return;
            }
            
            container.innerHTML = nettverkData.blogg.map(post => `
                <article class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100 flex flex-col justify-between">
                    <div class="p-6">
                        <span class="inline-block text-xs font-semibold tracking-wider uppercase text-blue-600 bg-blue-50 px-2 py-1 rounded mb-4">${post.kategori || 'Generelt'}</span>
                        <h3 class="text-xl font-bold mb-2 text-gray-900">${post.tittel}</h3>
                        <p class="text-gray-600 text-sm mb-4 line-clamp-4">${post.innhold}</p>
                    </div>
                    <div class="bg-gray-50 px-6 py-4 border-t border-gray-100 text-xs text-gray-500 flex justify-between">
                        <span>Av: ${post.forfatter}</span>
                        <span>${post.publisert_dato.split(' ')[0]}</span>
                    </div>
                </article>
            `).join('');
        }

        // 4. RENDRE KALENDER
        function tegnKalender() {
            const container = document.getElementById('kalender-container');
            if (nettverkData.kalender.length === 0) {
                container.innerHTML = '<p class="text-gray-500 italic">Ingen planlagte webinarer eller hendelser for øyeblikket.</p>';
                return;
            }
            
            container.innerHTML = nettverkData.kalender.map(mote => {
                const badgeFarge = mote.type === 'webinar' ? 'bg-purple-100 text-purple-800' : 'bg-emerald-100 text-emerald-800';
                return `
                    <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                            <div class="flex items-center gap-2 mb-2">
                                <span class="px-2 py-0.5 text-xs font-medium rounded-full ${badgeFarge}">${mote.type.toUpperCase()}</span>
                                <span class="text-sm text-amber-600 font-semibold">${mote.start_tid}</span>
                            </div>
                            <h3 class="text-lg font-bold text-gray-900">${mote.tittel}</h3>
                            <p class="text-gray-600 text-sm mt-1">${mote.beskrivelse || ''}</p>
                        </div>
                        ${mote.sted_lenke ? `<a href="${mote.sted_lenke}" target="_blank" class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white text-center px-4 py-2 rounded-lg font-medium text-sm shadow transition">Gå til lenke / Teams</a>` : ''}
                    </div>
                `;
            }).join('');
        }

        // 5. RENDRE FILER (Og håndtere søk)
        function tegnFiler(filtrerteFiler = null) {
            const container = document.getElementById('filer-container');
            const fileneSomSkalVises = filtrerteFiler || nettverkData.filer;
            
            if (fileneSomSkalVises.length === 0) {
                container.innerHTML = '<p class="p-6 text-gray-500 italic text-center">Ingen filer matcher søket eller arkivet er tomt.</p>';
                return;
            }
            
            // Bygger en ryddig tabellstruktur
            container.innerHTML = `
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-100 border-b border-gray-200 text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                <th class="p-4">Dokumentnavn / Tittel</th>
                                <th class="p-4">Kategori</th>
                                <th class="p-4">Emnetagg</th>
                                <th class="p-4 text-right">Handling</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100 text-sm">
                            ${fileneSomSkalVises.map(fil => `
                                <tr class="hover:bg-gray-50 transition">
                                    <td class="p-4">
                                        <div class="font-bold text-gray-900">${fil.tittel}</div>
                                        <div class="text-xs text-gray-500 mt-0.5 max-w-md truncate" title="${fil.beskrivelse || ''}">${fil.beskrivelse || 'Ingen beskrivelse.'}</div>
                                    </td>
                                    <td class="p-4">
                                        <span class="text-xs font-medium text-gray-600 bg-gray-100 px-2 py-1 rounded">${fil.kategori_navn || 'Ukatatlogisert'}</span>
                                    </td>
                                    <td class="p-4">
                                        <span class="text-xs font-medium text-blue-600 bg-blue-50 px-2 py-1 rounded">${fil.emne || 'Felles'}</span>
                                    </td>
                                    <td class="p-4 text-right">
                                        <a href="${fil.r2_url}" download="${fil.fil_navn}" target="_blank" class="inline-flex items-center text-sm font-semibold text-blue-600 hover:text-blue-800">
                                            Last ned (.${fil.fil_navn.split('.').pop()})
                                        </a>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        // 6. FILTRERINGS-FUNKSJON FOR SØK
        function filtrerFiler() {
            const sokestreng = document.getElementById('fil-sok').value.toLowerCase();
            const matchendeFiler = nettverkData.filer.filter(fil => {
                return fil.tittel.toLowerCase().includes(sokestreng) || 
                       (fil.emne && fil.emne.toLowerCase().includes(sokestreng)) ||
                       (fil.beskrivelse && fil.beskrivelse.toLowerCase().includes(sokestreng)) ||
                       fil.kategori_navn.toLowerCase().includes(sokestreng);
            });
            tegnFiler(matchendeFiler);
        }

        function visFeilmeldinger() {
            const feilHtml = '<p class="text-red-500 italic p-4">Kunne ikke laste innhold. Sørg for at Raspberry Pi har publisert data.json.</p>';
            document.getElementById('blogg-container').innerHTML = feilHtml;
            document.getElementById('kalender-container').innerHTML = feilHtml;
            document.getElementById('filer-container').innerHTML = feilHtml;
        }

        // Starter automatisk innlasting når siden åpnes
        lastData();
    </script>
</body>
</html>
